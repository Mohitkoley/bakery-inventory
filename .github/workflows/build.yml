name: Build Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: macos-latest
            artifact_name: macos
          - platform: windows-latest
            artifact_name: windows
          - platform: ubuntu-latest
            artifact_name: linux

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build Vite
        run: bun run vite build

      - name: Build Electron App (Windows)
        if: matrix.platform == 'windows-latest'
        run: bunx electrobun build --platform win --arch x64 --env=stable

      - name: Build Electron App (macOS)
        if: matrix.platform == 'macos-latest'
        run: bunx electrobun build --platform mac --arch arm64 --env=stable

      - name: Build Electron App (Linux)
        if: matrix.platform == 'ubuntu-latest'
        run: bunx electrobun build --platform linux --arch x64 --env=stable

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: bakery-inventory-${{ matrix.artifact_name }}
          path: |
            artifacts/
            !artifacts/**/*.pdb
          retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      # NEW STEP: Zip each OS folder into a single, release-ready file
      - name: Zip artifacts for release
        run: |
          cd release-artifacts
          # Loop through every folder downloaded and zip its contents
          for dir in */; do
            # Remove the trailing slash from the directory name
            dir_name=${dir%/}
            # Create a zip file named after the folder (e.g., bakery-inventory-windows.zip)
            zip -r "${dir_name}.zip" "$dir_name"
          done

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_type == 'tag' && github.ref_name || format('v0.0.{0}', github.run_number) }}
          # Only upload the newly created .zip files
          files: release-artifacts/*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
